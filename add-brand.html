<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>브랜드 추가/수정 - 브랜드 허브</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header class="site-header">
    <a class="logo" href="index.html">🗂️ 브랜드 허브</a>
    <nav>
      <a class="btn" href="settings.html">⚙️ 설정</a>
      <a class="btn btn-primary" href="add-brand.html">+ 브랜드 추가</a>
    </nav>
  </header>

  <main class="container">
    <div class="page-title-row"><h1 id="page-title">브랜드 추가</h1></div>

    <div class="form-card">
      <div class="tabs-form-nav" id="form-tabs">
        <button class="active" data-tab="basic">기본정보</button>
        <button data-tab="logoimages">로고·이미지</button>
        <button data-tab="presentations">발표자료</button>
        <button data-tab="overview">개요</button>
        <button data-tab="colors">브랜드컬러</button>
        <button data-tab="copy">카피문구</button>
        <button data-tab="lunch">점심메뉴</button>
        <button data-tab="dinner">저녁메뉴</button>
        <button data-tab="season">시즌메뉴</button>
        <button data-tab="events">이벤트</button>
      </div>

      <div id="form-panels">
        <section class="form-panel active" data-panel="basic">
          <div class="field-row">
            <label>브랜드명</label>
            <input type="text" id="f-name" placeholder="예: 쟁반집">
          </div>
          <div class="field-row">
            <label>슬러그 (영문 URL, 등록 후 변경 불가)</label>
            <input type="text" id="f-slug" placeholder="예: jaengban-jip">
            <p class="hint">브랜드별 이미지/파일이 저장되는 경로에 사용돼요. 영문 소문자, 숫자, 하이픈만 사용하세요.</p>
          </div>
          <div class="field-row">
            <label>한 줄 태그라인</label>
            <input type="text" id="f-tagline" placeholder="예: 정성 가득한 술상 한 상">
          </div>
          <div class="field-row">
            <label>브랜드 대표 색상</label>
            <input type="color" id="f-color" value="#8B3A2F">
          </div>
        </section>

        <section class="form-panel" data-panel="logoimages">
          <div class="field-row">
            <label>로고</label>
            <div id="logo-field-wrap"></div>
          </div>
          <div class="field-row">
            <label>브랜드 이미지</label>
            <div id="brandImages-list"></div>
            <button type="button" class="btn add-row-btn" id="add-brandImage">+ 브랜드 이미지 추가</button>
          </div>
        </section>

        <section class="form-panel" data-panel="presentations">
          <div class="field-row">
            <label>발표자료 (PPT)</label>
            <div id="presentations-list"></div>
            <button type="button" class="btn add-row-btn" id="add-presentation">+ 발표자료 추가</button>
          </div>
        </section>

        <section class="form-panel" data-panel="overview">
          <div class="field-row"><label>한 줄 소개</label><textarea id="f-oneliner"></textarea></div>
          <div class="field-row"><label>브랜드 스토리</label><textarea id="f-story"></textarea></div>
          <div class="field-row"><label>컨셉</label><textarea id="f-concept"></textarea></div>
          <div class="field-row"><label>타깃 고객</label><textarea id="f-target"></textarea></div>
          <div class="field-row"><label>차별화 포인트</label><textarea id="f-diff"></textarea></div>
        </section>

        <section class="form-panel" data-panel="colors">
          <div id="brandColors-list"></div>
          <button type="button" class="btn add-row-btn" id="add-brandColor">+ 브랜드컬러 추가</button>
        </section>

        <section class="form-panel" data-panel="copy">
          <div class="field-row">
            <label>메인 슬로건</label>
            <input type="text" id="f-mainslogan">
          </div>
          <div class="field-row">
            <label>서브 슬로건</label>
            <div id="subSlogans-list"></div>
            <button type="button" class="btn add-row-btn" id="add-subSlogan">+ 서브 슬로건 추가</button>
          </div>
        </section>

        <section class="form-panel" data-panel="lunch">
          <div id="lunch-list"></div>
          <button type="button" class="btn add-row-btn" id="add-lunch">+ 점심메뉴 추가</button>
        </section>

        <section class="form-panel" data-panel="dinner">
          <div id="dinner-list"></div>
          <button type="button" class="btn add-row-btn" id="add-dinner">+ 저녁메뉴 추가</button>
        </section>

        <section class="form-panel" data-panel="season">
          <div id="season-list"></div>
          <button type="button" class="btn add-row-btn" id="add-season">+ 시즌메뉴 추가</button>
        </section>

        <section class="form-panel" data-panel="events">
          <div id="events-list"></div>
          <button type="button" class="btn add-row-btn" id="add-event">+ 이벤트 추가</button>
        </section>
      </div>

      <div class="save-bar">
        <button class="btn btn-primary" id="submit-btn">저장하기</button>
        <span id="submit-status" class="hint"></span>
      </div>

      <details class="advanced">
        <summary>고급: JSON 직접 보기/다운로드 (GitHub 연결 없이 수동 백업용)</summary>
        <div class="save-bar">
          <button class="btn btn-sm" id="btn-preview">JSON 미리보기</button>
          <button class="btn btn-sm" id="btn-download">JSON 다운로드</button>
        </div>
        <textarea id="json-preview" readonly></textarea>
      </details>
    </div>
  </main>

  <script src="assets/js/github-api.js"></script>
  <script src="assets/js/add-brand.js"></script>
</body>
</html>
