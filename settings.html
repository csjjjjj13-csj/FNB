<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>설정 - 브랜드 허브</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header class="site-header">
    <a class="logo" href="index.html">🗂️ 브랜드 허브</a>
    <nav>
      <a class="btn" href="settings.html">⚙️ 설정</a>
      <a class="btn btn-primary" href="add-brand.html">+ 브랜드 추가</a>
    </nav>
  </header>

  <main class="container">
    <div class="page-title-row"><h1>GitHub 연결 설정</h1></div>
    <div class="form-card">
      <p class="hint">
        브랜드를 등록/수정하면 이 정보를 이용해 GitHub 저장소에 자동으로 커밋됩니다.
        Fine-grained Personal Access Token에는 이 저장소에 대한 <b>Contents: Read and write</b> 권한이 필요합니다.
      </p>

      <div class="field-row">
        <label>GitHub 사용자명 / 조직명 (owner)</label>
        <input type="text" id="gh-owner" placeholder="예: csjjjjj13-csj">
      </div>
      <div class="field-row">
        <label>저장소 이름 (repo)</label>
        <input type="text" id="gh-repo" placeholder="예: my-homepage">
      </div>
      <div class="field-row">
        <label>브랜치</label>
        <input type="text" id="gh-branch" placeholder="main" value="main">
      </div>
      <div class="field-row">
        <label>Personal Access Token</label>
        <input type="text" id="gh-token" placeholder="github_pat_... 또는 ghp_...">
      </div>

      <div class="save-bar">
        <button class="btn btn-primary" id="btn-save">저장</button>
        <button class="btn" id="btn-test">연결 테스트</button>
        <button class="btn" id="btn-clear">연결 정보 삭제</button>
        <span id="settings-status" class="hint"></span>
      </div>
    </div>
  </main>

  <script src="assets/js/github-api.js"></script>
  <script src="assets/js/settings.js"></script>
</body>
</html>
